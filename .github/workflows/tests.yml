name: Tests

on: [push]

env:
  NODE_ENV: test
  NODE_VERSION: 24
  JWT_SECRET: really-long-string-for-ci-environment_jwt
  SERVER_SECRET: really-long-string-for-ci-environment_server

jobs:
  api:
    name: api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      DATABASE_URL: postgres://oct:oct@localhost:5432/oct_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oct
          POSTGRES_PASSWORD: oct
          POSTGRES_DB: oct_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm db:migrate
      - name: Run tests
        run: pnpm test
  ui:
    name: ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
