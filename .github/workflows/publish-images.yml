name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dockerhub:
    name: dockerhub (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: api.dockerfile
          - image: ui
            dockerfile: ui.dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ vars.DOCKERHUB_IMAGE || 'fdebijl/open-cycle-tracker' }}
          # Every tag is suffixed with the component (e.g. latest-api, sha-abc123-ui).
          flavor: |
            latest=false
            suffix=-${{ matrix.image }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push (SLSA provenance attestation)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image == 'ui' && format('VITE_API_URL={0}', vars.VITE_API_URL || 'http://localhost:3000') || '' }}
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image }}-dockerhub
          cache-to: type=gha,scope=${{ matrix.image }}-dockerhub,mode=max

  ghcr:
    name: ghcr (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # OIDC, so attest-build-provenance can sign via Sigstore
      attestations: write # record the artifact attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: api.dockerfile
          - image: ui
            dockerfile: ui.dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compute image name
        id: name
        # GHCR requires a lowercase namespace; ${VAR,,} lowercases it.
        run: echo "ghcr=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/open-cycle-tracker" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.name.outputs.ghcr }}
          flavor: |
            latest=false
            suffix=-${{ matrix.image }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image == 'ui' && format('VITE_API_URL={0}', vars.VITE_API_URL || 'http://localhost:3000') || '' }}
          # No BuildKit provenance here; the artifact attestation below covers GHCR
          # and provenance:false keeps a plain manifest for it to reference.
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}-ghcr
          cache-to: type=gha,scope=${{ matrix.image }}-ghcr,mode=max

      - name: Attest build provenance (artifact attestation)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.name.outputs.ghcr }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
